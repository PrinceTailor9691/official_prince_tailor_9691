<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINCE TAILOR | TECH TITAN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@900&family=Inter:wght@400;900&display=swap');

        :root {
            /* NEW POWERFUL BACKGROUND COLOR */
            --bg: radial-gradient(circle at center, #0a001a 0%, #020205 100%);
            --accent: #00f2ff;
            --nvidia: #76b900;
            --tesla: #cc0000;
            --gemini: #8E75FF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #020205; 
            background-image: var(--bg);
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .hero-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 12vw, 8rem);
            text-align: center;
            background: linear-gradient(180deg, #fff 40%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.2));
        }

        .tagline {
            font-family: 'Syncopate'; font-size: 0.7rem; letter-spacing: 8px;
            color: var(--accent); margin-bottom: 20px;
        }

        /* BRAND GRID - POWERFUL WORLD LEADERS */
        .brand-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        @media (min-width: 768px) {
            .brand-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .brand-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }

        .brand-card:hover { 
            border-color: var(--accent); 
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-5px);
        }

        .brand-card svg { width: 45px; height: 45px; margin-bottom: 10px; }
        .brand-card span { display: block; font-family: 'Syncopate'; font-size: 0.55rem; font-weight: bold; opacity: 0.8; }

        /* IDENTITY DATA */
        .data-box {
            width: 100%; max-width: 500px;
            background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05);
            padding: 30px; border-radius: 30px;
        }

        .data-row {
            display: flex; justify-content: space-between;
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .data-label { color: var(--accent); font-family: 'Syncopate'; font-size: 0.5rem; }
        .data-val { font-weight: 900; font-size: 1.2rem; font-family: 'Orbitron'; }

        /* INSTAGRAM BUTTON */
        .insta-link {
            display: inline-block;
            margin-top: 30px;
            padding: 22px 60px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-family: 'Syncopate';
            font-size: 0.9rem;
            border-radius: 10px;
            font-weight: 900;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .insta-link:hover { 
            background: var(--accent); 
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.5);
            transform: scale(1.05);
        }

    </style>
</head>
<body>

        <p style="margin-top: 50px; opacity: 0.1; font-size: 0.5rem; font-family: 'Syncopate';">PRINCE TAILOR ENGINE // V.2.0.26</p>

</body>
</html>
