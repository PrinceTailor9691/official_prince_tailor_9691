<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINCE TAILOR | TECH TITAN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@900&family=Inter:wght@400;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            /* ANIMATED COLORFUL BACKGROUND */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000428);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        section {
            min-height: auto; /* Space कम करने के लिए */
            padding: 40px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 6rem);
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            margin-bottom: 5px;
        }

        .tagline {
            font-family: 'Syncopate'; font-size: 0.6rem; letter-spacing: 5px;
            color: #00f2ff; margin-bottom: 20px; text-transform: uppercase;
        }

        /* COMPACT BRAND GRID - 12+ BRANDS */
        .brand-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 800px;
        }

        @media (min-width: 768px) {
            .brand-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .brand-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .brand-card:hover { background: #fff; color: #000; transform: scale(1.05); }

        .brand-card svg { width: 30px; height: 30px; margin-bottom: 5px; }
        .brand-card span { display: block; font-family: 'Syncopate'; font-size: 0.45rem; font-weight: bold; }

        /* DATA BOX COMPACT */
        .data-box {
            width: 100%; max-width: 500px;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; border-radius: 20px;
        }

        .data-row {
            display: flex; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .data-label { color: #00f2ff; font-family: 'Syncopate'; font-size: 0.5rem; }
        .data-val { font-weight: 800; font-size: 1rem; }

        .insta-link {
            margin-top: 20px;
            padding: 15px 40px;
            background: #fff; color: #000;
            text-decoration: none; font-family: 'Syncopate';
            font-size: 0.7rem; border-radius: 5px; font-weight: 900;
        }
    </style>
</head>
<body>

                <span>JIO</span>

</body>
</html>
