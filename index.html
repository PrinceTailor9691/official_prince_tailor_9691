<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="CzC0nJ2gcJTKm_fs-Rts94EWBperq31r1iIJViD39eY" />
    <title>PRINCE TAILOR | ELITE ARCHITECT</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;900&family=Bebas+Neue&display=swap');

        :root {
            --bg: #000000;
            --accent: #ff003c;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* कर्सर को मोबाइल पर छिपाया ताकि ब्लैंक स्पेस न दिखे */
        #cursor {
            position: fixed; width: 12px; height: 12px; background: #fff;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            mix-blend-mode: difference; display: none;
        }
        @media (min-width: 1024px) { #cursor { display: block; } }

        section {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .hero-title {
            font-family: 'Bebas Neue';
            font-size: clamp(4rem, 15vw, 10rem);
            line-height: 0.85;
            text-align: center;
            margin-bottom: 20px;
        }

        .tagline {
            font-family: 'Syncopate'; font-size: 0.6rem; letter-spacing: 5px;
            margin-bottom: 30px; color: var(--accent); text-align: center;
        }

        /* BRAND GRID - FIXED IMAGES */
        .brand-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .brand-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            transition: 0.3s;
        }

        .brand-card img {
            max-width: 50px;
            margin-bottom: 10px;
            filter: brightness(1.5);
        }

        .brand-card span {
            font-family: 'Bebas Neue';
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* DATA TABLE */
        .data-table { width: 100%; max-width: 600px; margin-top: 40px; }
        .data-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 15px 0; 
            border-bottom: 1px solid var(--border);
        }
        .data-label { font-family: 'Syncopate'; font-size: 0.6rem; color: var(--accent); }
        .data-val { font-weight: 900; font-size: 1.5rem; }

        .insta-btn {
            font-family: 'Bebas Neue'; font-size: clamp(3rem, 10vw, 6rem);
            text-decoration: none; color: #fff;
            border-bottom: 4px solid var(--accent);
            transition: 0.3s;
        }

        footer {
            padding: 30px; text-align: center;
            font-family: 'Syncopate'; font-size: 0.5rem; opacity: 0.4;
        }

    </style>
</head>
<body>

    <div id="cursor"></div>

    <section>
        <div class="tagline">FULL-STACK ELITE ENGINEER</div>
        <h1 class="hero-title">PRINCE<br><span style="color: var(--accent);">TAILOR</span></h1>
        <p style="opacity: 0.5; font-size: 0.8rem;">SIKAR // RAJASTHAN // INDIA</p>
    </section>

    <section>
        <div class="tagline">ELITE TECHNOLOGIES</div>
        <div class="brand-grid">
            <div class="brand-card">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google">
                <span>GOOGLE</span>
            </div>
            <div class="brand-card">
                <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" alt="Microsoft">
                <span>MICROSOFT</span>
            </div>
            <div class="brand-card">
                <img src="https://cdn-icons-png.flaticon.com/512/5969/5969202.png" alt="Amazon">
                <span>AMAZON</span>
            </div>
            <div class="brand-card" style="background: rgba(15, 61, 145, 0.1);">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Reliance_Jio_Logo.svg/1024px-Reliance_Jio_Logo.svg.png" alt="Jio">
                <span>JIO</span>
            </div>
            <div class="brand-card">
                <img src="https://cdn-icons-png.flaticon.com/512/882/882704.png" alt="Apple" style="filter: invert(1);">
                <span>APPLE</span>
            </div>
            <div class="brand-card" style="background: rgba(138, 43, 226, 0.1);">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ec/Gemini_logo.svg" alt="Gemini">
                <span>GEMINI</span>
            </div>
        </div>
    </section>

    <section>
        <div class="tagline">IDENTITY REPORT</div>
        <div class="data-table">
            <div class="data-row">
                <span class="data-label">IDENTITY</span>
                <span class="data-val">PRINCE TAILOR</span>
            </div>
            <div class="data-row">
                <span class="data-label">CHRONOLOGY</span>
                <span class="data-val">15 YEARS OLD</span>
            </div>
            <div class="data-row">
                <span class="data-label">DOB</span>
                <span class="data-val">28/12/2010</span>
            </div>
            <div class="data-row">
                <span class="data-label">ORIGIN</span>
                <span class="data-val">SIKAR, RJ</span>
            </div>
        </div>
    </section>

    <section>
        <div class="tagline">CONNECT PROTOCOL</div>
        <a href="https://www.instagram.com/official_prince_tailor_9691?igsh=MWN6aW1vejNsODB3Mw==" class="insta-btn">INSTAGRAM</a>
    </section>

    <footer>
        © 2026 PRINCE TAILOR CORE // SIKAR, INDIA
    </footer>

    <script>
        // डेस्कटॉप के लिए कर्सर
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });

        // सरल एनिमेशन जो मोबाइल पर भी काम करेंगे
        gsap.registerPlugin(ScrollTrigger);

        gsap.utils.toArray('section').forEach(section => {
            gsap.from(section, {
                scrollTrigger: {
                    trigger: section,
                    start: "top 80%",
                },
                opacity: 0,
                y: 30,
                duration: 0.8
            });
        });
    </script>
</body>
</html>
