<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRINCE TAILOR | THE ELITE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@900&family=Inter:wght@400;900&display=swap');

        :root {
            --bg: #000000;
            --gemini: #8E75FF;
            --apple: #555555;
            --accent: #00f2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            border-bottom: 1px solid #111;
        }

        /* HERO - No Blank Space */
        .hero-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 12vw, 8rem);
            text-align: center;
            background: linear-gradient(180deg, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .tagline {
            font-family: 'Syncopate'; font-size: 0.7rem; letter-spacing: 8px;
            color: var(--accent); margin-bottom: 20px;
        }

        /* BRAND GRID - INTERNAL SVGS (Will always show) */
        .brand-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .brand-card {
            background: #080808;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
        }

        .brand-card:hover { border-color: var(--accent); background: #111; }

        .brand-card svg { width: 50px; height: 50px; margin-bottom: 10px; }

        .brand-card span {
            display: block; font-family: 'Syncopate'; font-size: 0.6rem; font-weight: bold;
        }

        /* IDENTITY REPORT */
        .data-box {
            width: 100%; max-width: 500px;
            background: #050505; border: 1px solid #111;
            padding: 30px; border-radius: 30px;
        }

        .data-row {
            display: flex; justify-content: space-between;
            padding: 15px 0; border-bottom: 1px solid #111;
        }

        .data-label { color: var(--accent); font-family: 'Syncopate'; font-size: 0.5rem; }
        .data-val { font-weight: 900; font-size: 1.2rem; }

        /* INSTAGRAM BUTTON */
        .insta-link {
            display: inline-block;
            margin-top: 30px;
            padding: 20px 50px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-family: 'Syncopate';
            font-size: 0.8rem;
            border-radius: 50px;
            font-weight: 900;
            transition: 0.3s;
        }
        .insta-link:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(255,255,255,0.4); }

    </style>
</head>
<body>

    <section>
        <p class="tagline">ELITE DEVELOPER</p>
        <h1 class="hero-name">PRINCE<br>TAILOR</h1>
        <p style="margin-top: 20px; opacity: 0.4; font-size: 0.7rem;">SIKAR // RAJASTHAN // INDIA</p>
    </section>

    <section>
        <p class="tagline">OFFICIAL BRANDS</p>
        <div class="brand-grid">

                <span>APPLE</span>
            </div>
            <div class="brand-card" style="border-color: var(--gemini);">
                <svg viewBox="0 0 24 24" fill="#8E75FF"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
                <span style="color: var(--gemini);">GEMINI AI</span>

                <span>GOOGLE</span>
            </div>
            <div class="brand-card">
                <svg viewBox="0 0 448 512" fill="#00A4EF"><path d="M0 32h214.7v214.7H0V32zm233.3 0H448v214.7H233.3V32zM0 265.3h214.7V480H0V265.3zm233.3 0H448V480H233.3V265.3z"/></svg>
                <span>MICROSOFT</span>
            </div>
        </div>
    </section>

    <section>
        <p class="tagline">DATA REPORT</p>
        <div class="data-box">
            <div class="data-row"><span class="data-label">NAME</span><span class="data-val">PRINCE TAILOR</span></div>
            <div class="data-row"><span class="data-label">CHRONOLOGY</span><span class="data-val">15 YEARS</span></div>
            <div class="data-row"><span class="data-label">BORN</span><span class="data-val">28/12/2010</span></div>
            <div class="data-row"><span class="data-label">ORIGIN</span><span class="data-val">SIKAR, RJ</span></div>
        </div>
    </section>

    <section>
        <p class="tagline">GET IN TOUCH</p>
        <a href="https://www.instagram.com/official_prince_tailor_9691?igsh=MWN6aW1vejNsODB3Mw==" class="insta-link">INSTAGRAM</a>
        <p style="margin-top: 50px; opacity: 0.2; font-size: 0.5rem; font-family: 'Syncopate';">© 2026 PRINCE TAILOR CORE</p>
    </section>

</body>
</html>
